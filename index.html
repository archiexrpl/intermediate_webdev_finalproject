<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Interest Rate Calculator - Quickly Calculate Interest on Loans</title>

  <meta
    name="description"
    content="Quickly and accurately calculate interest rates on loans with our easy-to-use interest rate calculator. Determine the interest you'll pay and make informed financial decisions. Try our free online calculator now."
  />

  <link rel="icon" href="favicon.ico" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">
    <section class="calculator-card">
      <h1>Interest Rate Calculator</h1>

      <p class="intro-text">
        Enter the principal amount, interest rate, and time period to calculate
        the simple interest and total payable amount.
      </p>

      <div class="form-group">
        <label for="principal">Principal Amount</label>
        <input
          type="number"
          id="principal"
          placeholder="Enter principal amount"
          min="0"
        />
      </div>

      <div class="form-group">
        <label for="rate">Rate of Interest (%)</label>
        <input
          type="number"
          id="rate"
          placeholder="Enter interest rate"
          min="0"
          step="0.01"
        />
      </div>

      <div class="form-group">
        <label for="time">Time Period (Years)</label>
        <input
          type="number"
          id="time"
          placeholder="Enter time in years"
          min="0"
          step="0.01"
        />
      </div>

      <button type="button" onclick="calculate()">Calculate</button>

      <div id="result" class="result-box"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
